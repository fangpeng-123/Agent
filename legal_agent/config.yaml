# 服务模式配置
service:
  mode: auto  # auto:自动检测, local:本地模型, api:API服务
  local_model_path: ./models

# Embedding配置
embedding:
  local:
    model_name: BAAI/bge-small-zh
    device: cuda  # cuda或cpu
  api:
    provider: ali
    model: text-embedding-v2
    dimensions: 1536

# LLM配置
llm:
  local:
    model_name: Qwen/Qwen2.5-7B-Instruct
    device: cuda
  api:
    provider: ali
    model: qwen-turbo
    max_tokens: 2000
    temperature: 0.7

# RAG配置
rag:
  top_k: 5
  max_history: 5
  chunk_size: 500
  chunk_overlap: 100

# 服务器配置
server:
  host: 0.0.0.0
  port: 8000

# 向量库配置
vector_store:
  type: milvus  # milvus或faiss
  milvus:
    host: localhost
    port: 19530
  faiss:
    index_path: data/index/faiss.index

# 对话历史配置
history:
  db_path: data/sqlite/history.db
  max_sessions: 100

# 内容安全配置
safety:
  enabled: true
  sensitive_words:
    - 分裂
    - 叛乱
    - 恐怖
